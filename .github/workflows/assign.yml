---
name: assign
on:
  pull_request:
    types: [opened, ready_for_review]
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
jobs:
  add-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: kentaro-m/auto-assign-action@0a2c53d3721e4c5cfcce6afd4014aecc337979f6 # v2.0.2
        with:
          configuration-path: .github/auto-assign.yml # Only needed if you use something other than .github/auto_assign.yml
